  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="136" y="140" width="240" height="300" rx="20" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="196" y="112" width="120" height="56" rx="14" fill="url(#clip)"/>
  <circle cx="256" cy="140" r="14" fill="#6366f1"/>
  <!-- Check lines -->
  <rect x="180" y="216" width="152" height="16" rx="8" fill="#e0e7ff"/>
  <rect x="180" y="258" width="120" height="16" rx="8" fill="#e0e7ff"/>
  <rect x="180" y="300" width="152" height="16" rx="8" fill="#e0e7ff"/>
  <rect x="180" y="342" width="96" height="16" rx="8" fill="#e0e7ff"/>
  <!-- Checkmark on first line -->
  <path d="M168 224 l-18-18 l-8 8 l26 26 l40-40 l-8-8 z" fill="#6366f1" transform="translate(24, 0)"/>
</svg>
